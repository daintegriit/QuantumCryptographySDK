version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: crypto-backend
    ports:
      - "8008:8008"
    env_file:
      - backend/.env
    restart: unless-stopped
  frontend:
    build:
      context: frontend/dashboard
      dockerfile: Dockerfile.prod
    container_name: crypto-frontend
    ports:
      - "3008:3008"
    restart: unless-stopped
    depends_on:
      - backend
